[build]
  publish = "."

[[edge_functions]]
  function = "og"
  path = "/story/*"

# SPA fallback: serve index.html for all /story/* routes (browsers only, crawlers handled by edge fn)
[[redirects]]
  from = "/story/*"
  to = "/index.html"
  status = 200
  force = false

# Catch-all SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/images/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"
