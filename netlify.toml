[build]
  publish = "."

[[edge_functions]]
  function = "og"
  path = "/story/*"

# Disable bot protection on story pages so social crawlers can reach the edge function
[[headers]]
  for = "/story/*"
  [headers.values]
    X-Robots-Tag = "index, follow"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/assets/articles.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/images/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=86400"
