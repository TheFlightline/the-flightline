<!-- SIDEBAR CALENDAR WIDGET — paste into index.html sidebar -->
<div class="sidebar-widget" id="sidebar-calendar">
  <div class="sidebar-widget-header">
    <span>COMMUNITY CALENDAR</span>
  </div>
  <div class="sidebar-widget-body" style="padding:0;">

    <!-- Mini calendar -->
    <div style="padding:10px 12px 0;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <button id="side-cal-prev" data-dir="-1" style="background:none;border:none;cursor:pointer;padding:2px 6px;font-size:15px;color:var(--navy);line-height:1;" aria-label="Previous month">‹</button>
        <span id="side-cal-label" style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.04em;color:var(--navy);"></span>
        <button id="side-cal-next" data-dir="1" style="background:none;border:none;cursor:pointer;padding:2px 6px;font-size:15px;color:var(--navy);line-height:1;" aria-label="Next month">›</button>
      </div>

      <!-- Day-of-week header -->
      <div id="side-cal-dow" style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px;">
        <span style="font-size:9px;font-weight:700;color:var(--g2);text-transform:uppercase;">Su</span>
        <span style="font-size:9px;font-weight:700;color:var(--g2);text-transform:uppercase;">Mo</span>
        <span style="font-size:9px;font-weight:700;color:var(--g2);text-transform:uppercase;">Tu</span>
        <span style="font-size:9px;font-weight:700;color:var(--g2);text-transform:uppercase;">We</span>
        <span style="font-size:9px;font-weight:700;color:var(--g2);text-transform:uppercase;">Th</span>
        <span style="font-size:9px;font-weight:700;color:var(--g2);text-transform:uppercase;">Fr</span>
        <span style="font-size:9px;font-weight:700;color:var(--g2);text-transform:uppercase;">Sa</span>
      </div>

      <!-- Calendar grid — populated by JS -->
      <div id="side-cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px 0;"></div>
    </div>

    <!-- Selected-day event list — hidden until a day is clicked -->
    <div id="side-cal-day-events" style="display:none;border-top:1px solid var(--bd);padding:8px 12px 6px;background:#f9f9f9;"></div>

    <!-- Upcoming events list -->
    <div style="border-top:2px solid var(--bd);padding:8px 12px 0;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.06em;color:var(--g2);margin-bottom:6px;">UPCOMING EVENTS</div>
      <div id="side-cal-list"></div>
    </div>

    <!-- Footer button -->
    <div style="padding:8px 12px 10px;">
      <button id="side-cal-view-all" style="width:100%;background:none;border:1px solid var(--navy);color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.06em;padding:5px 0;cursor:pointer;transition:background .15s,color .15s;">VIEW ALL EVENTS &rarr;</button>
    </div>

  </div>
</div>
<!-- END SIDEBAR CALENDAR WIDGET -->
